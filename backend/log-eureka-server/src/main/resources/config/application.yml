# 전 서비스 공통 설정 — Config Server(Eureka 노드)에서 배포
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:28761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD:logdetect}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.gijun.logdetect.*"
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

redisson:
  address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}

logdetect:
  kafka:
    topics:
      logs-raw: logs.raw
      logs-detected: logs.detected
      alerts-dispatched: alerts.dispatched
