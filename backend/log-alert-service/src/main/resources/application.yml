server:
  port: 28083

spring:
  application:
    name: log-alert-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:28761}
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD}

  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:pool:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    properties:
      schema: alert
    pool:
      initial-size: 5
      max-size: 20

  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    schemas: alert
    default-schema: alert
    table: flyway_schema_history

logdetect:
  alert:
    dedupe-ttl-seconds: ${ALERT_DEDUPE_TTL:600}
    dispatchers:
      log:
        enabled: true
      webhook:
        enabled: false
        url: ${ALERT_WEBHOOK_URL:}
