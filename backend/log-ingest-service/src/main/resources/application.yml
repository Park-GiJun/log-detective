server:
  port: 28081

spring:
  application:
    name: log-ingest-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:28761}
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD}

  # 이슈 #92 — Hikari pool 명시.
  # Spring Boot default(maximum-pool-size=10) 으로는 outbox dispatch scheduler 동시성 +
  # ingest API 병행 + retention/cleanup 잡이 겹칠 때 connection 부족.
  # 값은 운영 측정(p99 latency, pool wait 메트릭) 기반으로 환경별 조정한다.
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:5000}        # 5s — getConnection 대기 한계
      leak-detection-threshold: ${DB_POOL_LEAK_THRESHOLD:30000}     # 30s — 트랜잭션 누수 조기 탐지
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}                 # 30min — DB / LB 타임아웃보다 짧게
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}                  # 10min

  jpa:
    properties:
      hibernate:
        default_schema: ingest
  flyway:
    schemas: ingest
    default-schema: ingest
    table: flyway_schema_history

  # 이슈 #91 — default KafkaTemplate(JsonSerializer 기반) 에도 idempotence / max.in.flight / compression 적용.
  # outboxKafkaTemplate(ByteArray) 측은 KafkaProducerConfig 에서 동일 옵션 적용.
  kafka:
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: lz4

logdetect:
  ingest:
    batch-max-size: ${INGEST_BATCH_MAX:500}
    # 이슈 #86 — X-API-Key 헤더 인증용 사전 공유키.
    # 비어있으면 ApiKeyAuthenticationFilter 가 부팅 시 fail-fast 한다.
    # log-generator 도 같은 값으로 설정해야 호출이 통과된다.
    api-key: ${INGEST_API_KEY:}
  outbox:
    # PII 마스킹 토글 — true 시 outbox.payload 의 ip/userId 가 마스킹되어 저장된다.
    # 다운스트림(ES/Kafka) 도 마스킹된 데이터를 받게 되므로 운영 결정에 따라 활성화.
    payload-pii-mask: ${OUTBOX_PAYLOAD_PII_MASK:false}
    pii:
      # MASK — IPv4 /16, IPv6 앞 64bit, userId 길이 보존 * (가독성 우선).
      # HASH — HMAC-SHA256(salt) deterministic pseudonymization (GDPR 강화).
      mode: ${OUTBOX_PII_MODE:MASK}
      # HMAC salt — HASH 모드 활성화 시 반드시 지정. 누설 시 회전 필요.
      salt: ${OUTBOX_PII_SALT:}
    retention:
      # PUBLISHED 행 보관 기한 (일). 기한 초과 시 retention 잡이 purge.
      published-days: ${OUTBOX_RETENTION_PUBLISHED_DAYS:7}
      # DEAD 행 보관 기한 (일). 운영자 분석 여유 후 purge.
      dead-days: ${OUTBOX_RETENTION_DEAD_DAYS:30}
      # retention 잡 cron — 기본 매일 03:00 (Asia/Seoul).
      cron: ${OUTBOX_RETENTION_CRON:0 0 3 * * *}
