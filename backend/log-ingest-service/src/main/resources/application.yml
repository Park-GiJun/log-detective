server:
  port: 28081

spring:
  application:
    name: log-ingest-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:28761}
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD}

  # 런타임 쿼리 — Exposed R2DBC
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:pool:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    properties:
      schema: ingest
    pool:
      initial-size: 5
      max-size: 20

  # 마이그레이션 전용 JDBC — Flyway
  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    schemas: ingest
    default-schema: ingest
    table: flyway_schema_history

logdetect:
  ingest:
    batch-max-size: ${INGEST_BATCH_MAX:500}
