server:
  port: 28082

spring:
  application:
    name: log-detection-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:28761}
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD}

  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:pool:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    properties:
      schema: detection
    pool:
      initial-size: 5
      max-size: 20

  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/logdetect}
    username: ${DB_USERNAME:logdetect}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    schemas: detection
    default-schema: detection
    table: flyway_schema_history

logdetect:
  detection:
    window-seconds: ${DETECTION_WINDOW_SECONDS:300}
    rules:
      brute-force:
        enabled: true
        threshold: 10
      sql-injection:
        enabled: true
      error-rate-spike:
        enabled: true
        multiplier: 3.0
