# ── Gradle 데몬 JVM ─────────────────────────────────────────────────
# JDK 25에서 kotlin-compiler-embeddable 내부 sun.misc.Unsafe 접근 경고 억제
# (ktlint가 임베디드 컴파일러를 통해 AST 파싱할 때 발생)
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 --sun-misc-unsafe-memory-access=allow

# ── 빌드 성능 ──────────────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# ── Kotlin ─────────────────────────────────────────────────────────
kotlin.code.style=official
kotlin.incremental=true
